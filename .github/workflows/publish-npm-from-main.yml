name: publish-npm-manual

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Ensure release assets exist
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          for asset in olb-linux-x86_64 olb-macos-x86_64 olb-macos-arm64 olb-windows-x86_64.zip; do
            url="https://github.com/duanluan/openai-local-bridge/releases/download/v${version}/${asset}"
            code="$(curl -s -o /dev/null -w "%{http_code}" -L "${url}")"
            if [ "${code}" != "200" ]; then
              echo "missing release asset: ${url}" >&2
              exit 1
            fi
          done

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "skip ${name}@${version}"
            exit 0
          fi
          npm publish --access public
