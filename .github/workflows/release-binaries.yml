name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to republish from, for example v0.2.3
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v5

      - name: Check versions and tag
        id: version
        shell: bash
        run: |
          version="$(uv run python -c 'from scripts.release_common import project_version; print(project_version())')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          release_ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_ref="${{ github.event.inputs.release_tag }}"
          fi
          if [ "${release_ref}" != "v${version}" ]; then
            echo "tag ${release_ref} does not match v${version}" >&2
            exit 1
          fi

      - name: Run Python tests
        run: uv run python -m unittest discover -s tests

      - name: Run npm launcher tests
        run: node --test tests/test_npm_launcher.cjs

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x64
            os: ubuntu-latest
            target: olb-linux-x86_64
            binary: olb
            artifact_binary: olb-linux-x86_64
          - key: win32-x64
            os: windows-latest
            target: olb-windows-x86_64
            binary: olb.exe
            artifact_binary: olb-windows-x86_64.exe
          - key: darwin-x64
            os: macos-15-intel
            target: olb-macos-x86_64
            binary: olb
            artifact_binary: olb-macos-x86_64
          - key: darwin-arm64
            os: macos-14
            target: olb-macos-arm64
            binary: olb
            artifact_binary: olb-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Build standalone binary
        run: >
          uv run --with pyinstaller pyinstaller
          --onefile
          --clean
          --name olb
          --hidden-import openai_local_bridge
          --copy-metadata openai-local-bridge
          olb_cli.py

      - name: Prepare raw binary
        shell: bash
        run: |
          mkdir -p release/binaries
          cp "dist/${{ matrix.binary }}" "release/binaries/${{ matrix.artifact_binary }}"

      - name: Package release archive
        run: >
          uv run python scripts/package_binary.py
          --binary release/binaries/${{ matrix.artifact_binary }}
          --target ${{ matrix.target }}
          --output-dir release

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.key }}
          path: release/binaries/${{ matrix.artifact_binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.key }}
          path: release/${{ matrix.target }}*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - validate
      - build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          version="${{ needs.validate.outputs.version }}"
          note_file=".github/release-notes/v${version}.md"
          if [ -f "${note_file}" ]; then
            cp "${note_file}" release/RELEASE_NOTES.md
          else
            printf "# v%s\n\nEnglish\n\n- Release published.\n\n中文\n\n- 已发布版本。\n" "${version}" > release/RELEASE_NOTES.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: release/*

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/')
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Build Python distributions
        run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - validate
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "skip ${name}@${version}"
          else
            npm publish --access public || {
              latest_log="$(ls -t ~/.npm/_logs/*-debug-0.log 2>/dev/null | head -n 1)"
              if [ -n "${latest_log}" ]; then
                echo "npm debug log: ${latest_log}"
                tail -n 120 "${latest_log}"
              fi
              exit 1
            }
          fi

  publish-npm-existing:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package for existing tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "skip ${name}@${version}"
          else
            npm publish --access public || {
              latest_log="$(ls -t ~/.npm/_logs/*-debug-0.log 2>/dev/null | head -n 1)"
              if [ -n "${latest_log}" ]; then
                echo "npm debug log: ${latest_log}"
                tail -n 120 "${latest_log}"
              fi
              exit 1
            }
          fi
